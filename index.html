<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Burger Zone — hamburguesas artesanales en Concepción. Carta de clásicas, premium, veganas y más.">
  <title>Burger Zone — Hamburguesas artesanales</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <p class="logo">BURGER ZONE</p>
    <nav aria-label="Navegación principal">
      <ul>
        <li><a href="#carta">Carta</a></li>
        <li><a href="#contacto">Contacto</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="hero" aria-labelledby="hero-titulo">
      <h1 id="hero-titulo">Hamburguesas con alma penquista</h1>
      <p>Pan amasado a diario, carne a la parrilla y cero apuro.</p>
    </section>

    <section id="carta" aria-labelledby="carta-titulo">
      <h2 id="carta-titulo">Nuestra Carta</h2>

      <!-- Botones de categoría generados por JS -->
      <div id="filtros" role="group" aria-label="Filtrar por categoría"></div>

      <!-- Productos renderizados desde data/menu.json -->
      <div id="contenedor-carta" aria-live="polite"></div>
    </section>
  </main>

  <footer id="contacto">
    <p>Lunes a sábado, 12:30 a 23:00 hrs</p>
    <p>Av. Pedro de Valdivia 1450, Concepción</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
